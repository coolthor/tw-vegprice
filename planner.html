<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>種植排程規劃 — 台灣蔬菜價格</title>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d2e; --surface2:#252840;
  --border:#2e3250; --text:#e2e8f0; --muted:#8892a4;
  --green:#4ade80; --yellow:#fbbf24; --red:#f87171;
  --blue:#60a5fa; --purple:#a78bfa; --cyan:#22d3ee; --orange:#fb923c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SF Pro Text',system-ui,sans-serif;min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px}
nav a{color:var(--muted);text-decoration:none;font-size:14px}
nav a:hover{color:var(--text)}
nav .title{color:var(--text);font-weight:600;font-size:16px}
.container{max-width:1140px;margin:0 auto;padding:32px 20px}
h1{font-size:22px;font-weight:700;margin-bottom:6px}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:28px}

/* ── Panels ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:20px}
.panel-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
select,input[type=range],input[type=number],input[type=text]{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:8px 11px;font-size:13px;outline:none}
select:focus,input:focus{border-color:var(--purple)}
.ph-val{font-size:17px;font-weight:700;color:var(--cyan)}

/* ── Plots ── */
.plots-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.plot-row{display:grid;grid-template-columns:1fr 80px 120px 110px 100px auto;gap:10px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.plot-row input,.plot-row select{background:var(--bg);font-size:12px}
.plot-row label{font-size:10px;margin-bottom:3px}
.btn-del{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
.btn-del:hover{background:rgba(248,113,113,.25)}
.btn-add{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);border-radius:7px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer}
.btn-add:hover{background:rgba(74,222,128,.2)}

/* ── Costs toggle ── */
.costs-toggle{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer}
.costs-toggle:hover{border-color:var(--purple);color:var(--text)}
.costs-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:14px}
.costs-table th{text-align:left;padding:6px 10px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.costs-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.costs-table td:last-child{border-bottom:none}
.costs-table input{width:80px;text-align:right;font-size:12px;padding:4px 7px}

/* ── Run button ── */
.btn-run{background:var(--purple);color:#fff;border:none;border-radius:9px;padding:13px 0;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s;margin-top:6px}
.btn-run:hover{opacity:.85}

/* ── Section heading ── */
.sec{font-size:16px;font-weight:700;margin:32px 0 14px;display:flex;align-items:center;gap:8px}
.sec::before{content:'';display:block;width:4px;height:18px;background:var(--purple);border-radius:2px}

/* ── Gantt ── */
.gantt-wrap{overflow-x:auto}
.gantt{min-width:750px}
.gantt-header{display:grid;grid-template-columns:160px repeat(12,1fr);gap:2px;margin-bottom:4px}
.gantt-header .mh{text-align:center;font-size:10px;color:var(--muted);font-weight:600;padding:3px 0}
.gantt-plot-label{font-size:11px;font-weight:700;color:var(--purple);padding:8px 0 4px;grid-column:1/-1}
.gantt-row{display:grid;grid-template-columns:160px repeat(12,1fr);gap:2px;margin-bottom:2px;align-items:center}
.g-name{font-size:11px;color:var(--text);text-align:right;padding-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-cell{height:20px;border-radius:3px;background:var(--surface2);position:relative;overflow:hidden}
/* crop color bands */
.g-cell.plant{background:rgba(167,139,250,.4)}
.g-cell.grow{background:rgba(34,211,238,.18)}
.g-cell.h-hi{background:rgba(74,222,128,.6)}
.g-cell.h-med{background:rgba(251,191,36,.45)}
.g-cell.h-lo{background:rgba(248,113,113,.4)}
.g-cell.typhoon{outline:2px solid rgba(251,191,36,.55);outline-offset:-2px}
.g-cell.cold{outline:2px solid rgba(96,165,250,.55);outline-offset:-2px}
.gantt-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--muted)}
.leg{display:flex;align-items:center;gap:5px}
.leg-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}

/* ── Rotation warnings ── */
.rotation-warn{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.25);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--yellow);margin-bottom:16px}
.rotation-warn b{display:block;margin-bottom:4px}

/* ── Net profit table ── */
.net-table{width:100%;border-collapse:collapse;font-size:13px}
.net-table th{text-align:left;padding:8px 12px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
.net-table td{padding:9px 12px;border-bottom:1px solid var(--border)}
.net-table .num{text-align:right;font-variant-numeric:tabular-nums}
.net-table tfoot td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;font-size:14px}
.hi{color:var(--green);font-weight:700}
.med{color:var(--yellow)}
.lo{color:var(--red)}
.note{color:var(--muted);font-size:11px;margin-top:10px}

/* ── Crop color legend ── */
.crop-colors{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cc-item{display:flex;align-items:center;gap:5px;font-size:11px}
.cc-dot{width:12px;height:12px;border-radius:3px}
</style>
</head>

<div class="container">

  <div class="panel">

      </div>

        <label>灌溉設備</label>

          <option value="sprinkler">噴灌</option>
          <option value="manual">人工</option>
        </select>
      </div>
      <div>
        <label>種植經驗</label>
        <select id="exp">
          <option value="beginner">新手</option>
          <option value="mid" selected>中等</option>
          <option value="expert">老農</option>
        </select>
      </div>
      <div>
        <label>計畫起始月</label>
        <select id="startMonth">
          <option>1</option><option>2</option><option value="3" selected>3</option>
          <option>4</option><option>5</option><option>6</option>
          <option>7</option><option>8</option><option>9</option>
          <option>10</option><option>11</option><option>12</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ── 地塊管理 ── -->
  <div class="panel">
    <div class="panel-title">
      地塊管理
      <button class="btn-add" onclick="addPlot()">＋ 新增地塊</button>
    </div>
    <div class="plots-list" id="plotsList"></div>
    <div style="font-size:11px;color:var(--muted)">每塊地可設定不同的土壤條件；輪作規則在同一地塊內生效。</div>
  </div>

  <!-- ── 成本設定 ── -->
  <div class="panel">
    <div class="panel-title">
      成本設定（元 / 分地 / 輪）
      <button class="costs-toggle" onclick="toggleCosts()">展開調整 ▾</button>
    </div>
    <div id="costsPanel" style="display:none">
      <table class="costs-table" id="costsTable"></table>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">預設值參考台灣農業成本調查，可自行調整。1分地 ≈ 100 坪 ≈ 330 m²</div>
  </div>

  <button class="btn-run" onclick="runPlanner()">產生全年種植計畫</button>

  <!-- ── 結果 ── -->
  <div id="results" style="display:none">
    <div class="sec">全年輪作甘特圖</div>
    <div id="rotationWarns"></div>
    <div class="panel gantt-wrap"><div id="gantt"></div>
      <div class="gantt-legend">
        <div class="leg"><div class="leg-dot" style="background:rgba(167,139,250,.5)"></div>種植</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(34,211,238,.25)"></div>生長</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(74,222,128,.65)"></div>收成（高價）</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(251,191,36,.55)"></div>收成（中價）</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(248,113,113,.5)"></div>收成（低價）</div>
        <div class="leg"><div class="leg-dot" style="outline:2px solid rgba(251,191,36,.7);background:transparent"></div>颱風季</div>
        <div class="leg"><div class="leg-dot" style="outline:2px solid rgba(96,165,250,.7);background:transparent"></div>低溫</div>
      </div>
    </div>

    <div class="sec">預估淨利明細</div>
    <div class="panel">
      <table class="net-table" id="netTable"></table>
      <p class="note">※ 毛收入 = 產量 × 均價 × 良率 60%。淨利 = 毛收入 − 種苗 − 肥料 − 農藥 − 人工。未含折舊、土地租金。</p>
    </div>
  </div>
</div>

  north:   [15,16,18,22,26,29,31,31,28,24,20,16], // 台北

// 各科作物溫度需求
const FAMILY_TEMPS = {
  brassica:   { base:4.4, opt:[15,20], max:28 }, // 十字花科（高麗菜、蘿蔔）

/**
 * 動態週期計算：依地區溫度、土壤 pH、灌溉調整種植天數
 * 回傳 { days, factor, avgTemp, reason[] }
 */
function adjustedCycle(crop, plantMonth, region, plot) {
  const ft   = FAMILY_TEMPS[crop.family] || FAMILY_TEMPS.brassica;
  const temps = REGIONAL_TEMPS[region]  || REGIONAL_TEMPS.central;

  // 取種植月 + 生長中期的平均溫度
  const midIdx   = (plantMonth - 1 + Math.round(crop.cycle / 60)) % 12;
  const avgTemp  = (temps[(plantMonth - 1) % 12] + temps[midIdx]) / 2;

  let factor = 1.0;
  const reasons = [];

  // ① 溫度修正
  if (avgTemp < ft.base) {
    factor = 2.5; reasons.push(`均溫 ${Math.round(avgTemp)}°C 低於基礎溫 ${ft.base}°C，生長極緩`);
  } else if (avgTemp < ft.opt[0]) {
    const ratio = (ft.opt[0] - avgTemp) / (ft.opt[0] - ft.base);
    factor += ratio * 0.6;
    reasons.push(`均溫 ${Math.round(avgTemp)}°C 偏冷（最適 ${ft.opt[0]}-${ft.opt[1]}°C），延長 ${Math.round(ratio*60)} 天`);
  } else if (avgTemp > ft.max) {
    factor = 1.25; reasons.push(`均溫 ${Math.round(avgTemp)}°C 超過耐熱上限 ${ft.max}°C，高溫逆境`);
  } else if (avgTemp > ft.opt[1]) {
    const ratio = (avgTemp - ft.opt[1]) / (ft.max - ft.opt[1]);
    factor -= ratio * 0.1;
    reasons.push(`均溫 ${Math.round(avgTemp)}°C 偏熱，略縮短 ${Math.round(ratio*0.1*crop.cycle)} 天`);
  } else {
    reasons.push(`均溫 ${Math.round(avgTemp)}°C 在最適範圍內`);
  }

  // ② pH 修正
  const ph = parseFloat(plot.ph);
  const [phLo, phHi] = crop.ph;
  if (ph < phLo - 0.5 || ph > phHi + 0.5) {
    factor *= 1.15; reasons.push(`pH ${ph} 明顯偏離適範 ${phLo}-${phHi}，養分吸收受阻 +15%`);
  } else if (ph < phLo || ph > phHi) {
    factor *= 1.07; reasons.push(`pH ${ph} 略超適範 ${phLo}-${phHi}，+7%`);
  }

  // ③ 灌溉修正
  if (plot.irrigation === 'manual') {
    factor *= 1.08; reasons.push('人工澆水不穩定 +8%');
  } else if (plot.irrigation === 'drip') {
    factor *= 0.97; reasons.push('滴灌精準供水 -3%');
  }

  const days = Math.round(crop.cycle * factor);
  return { days, factor: Math.round(factor * 100) / 100, avgTemp: Math.round(avgTemp), reasons };
}

// 成本預設（元/分地/輪）
const DEFAULT_COSTS = {
  brassica:   {seed:500,  fert:1500, pest:800,  labor:3000},
  solanaceae: {seed:2000, fert:2500, pest:1500, labor:5000},
  cucurbit:   {seed:1500, fert:2000, pest:1200, labor:4000},
  grass:      {seed:800,  fert:1800, pest:600,  labor:2500},
  apiaceae:   {seed:600,  fert:1500, pest:800,  labor:3500},
};

// ── 地塊管理 ────────────────────────────────────────────────
let plotId = 0;
const plots = [];

function addPlot(name='', area=3, soil='loam', ph=6.5) {
  const id = ++plotId;
  plots.push({id, name: name || `地塊 ${id}`, area, soil, ph});
  renderPlots();
}
function removePlot(id) {
  const i = plots.findIndex(p=>p.id===id);
  if(i>=0) plots.splice(i,1);
  renderPlots();
}
function renderPlots() {
  const el = document.getElementById('plotsList');
  if(plots.length===0){ el.innerHTML='<div style="color:var(--muted);font-size:13px">尚未新增地塊</div>'; return; }
  el.innerHTML = plots.map(p=>`
    <div class="plot-row">
      <div><label>地塊名稱</label>
        <input type="text" value="${p.name}" onchange="plots.find(x=>x.id==${p.id}).name=this.value"></div>
      <div><label>面積（分）</label>
        <input type="number" value="${p.area}" min="0.5" step="0.5" onchange="plots.find(x=>x.id==${p.id}).area=parseFloat(this.value)||1"></div>
      <div><label>土壤類型</label>
        <select onchange="plots.find(x=>x.id==${p.id}).soil=this.value">
          <option value="sandy" ${p.soil==='sandy'?'selected':''}>砂質土</option>
          <option value="loam"  ${p.soil==='loam' ?'selected':''}>壤土</option>
          <option value="clay"  ${p.soil==='clay' ?'selected':''}>黏土</option>
        </select></div>
      <div><label>pH　<b style="color:var(--cyan)" id="phv${p.id}">${p.ph}</b></label>
        <input type="range" min="4.5" max="7.5" step="0.1" value="${p.ph}"
          oninput="document.getElementById('phv${p.id}').textContent=this.value;plots.find(x=>x.id==${p.id}).ph=parseFloat(this.value)"></div>
      <div style="display:flex;align-items:flex-end;padding-bottom:2px">
        <button class="btn-del" onclick="removePlot(${p.id})">✕ 移除</button></div>
    </div>`).join('');
}

// ── 成本表 ───────────────────────────────────────────────────
const cropCosts = {};
CROPS.forEach(c => {
  const def = DEFAULT_COSTS[c.family] || DEFAULT_COSTS.brassica;
  cropCosts[c.id] = {...def};
});

function renderCostsTable() {
  const t = document.getElementById('costsTable');
  const rows = CROPS.map(c=>{
    const co = cropCosts[c.id];
    return `<tr>
      <td>${c.name}</td>
      <td><input type="number" value="${co.seed}"  onchange="cropCosts['${c.id}'].seed=+this.value"  min="0"></td>
      <td><input type="number" value="${co.fert}"  onchange="cropCosts['${c.id}'].fert=+this.value"  min="0"></td>
      <td><input type="number" value="${co.pest}"  onchange="cropCosts['${c.id}'].pest=+this.value"  min="0"></td>
      <td><input type="number" value="${co.labor}" onchange="cropCosts['${c.id}'].labor=+this.value" min="0"></td>
      <td class="num" id="totalcost_${c.id}">${co.seed+co.fert+co.pest+co.labor}</td>
    </tr>`;
  }).join('');
  t.innerHTML = `<thead><tr><th>作物</th><th>種苗費</th><th>肥料</th><th>農藥</th><th>人工</th><th>合計/分</th></tr></thead>
    <tbody>${rows}</tbody>`;
}
function toggleCosts() {
  const p = document.getElementById('costsPanel');
  p.style.display = p.style.display==='none' ? 'block' : 'none';
}

// ── 評分 ─────────────────────────────────────────────────────
function scoreCrop(crop, cond, plot) {
  let score = 50;
  const ph = plot.ph;
  if(ph>=crop.ph[0] && ph<=crop.ph[1]) score+=25; else score-=12;
  if(crop.soils.includes(plot.soil)) score+=20; else score-=10;
  if(crop.env.includes(cond.env)||crop.env.includes('both')) score+=15;
  if(crop.irr.includes(cond.irrigation)) score+=10;
  const expMap={beginner:1,mid:2,expert:3};
  if(crop.diff<=expMap[cond.exp]) score+=10; else score-=10;
  // 黏土不種根莖類
  if(plot.soil==='clay'&&['radish','carrot'].includes(crop.id)) score-=25;
  // 勝率加分
  const wr=WIN_RATE[crop.name];
  if(wr) score+=Math.round((wr.win-55)*0.3);
  return Math.max(0,Math.min(100,score));
}

// ── 排程算法 ─────────────────────────────────────────────────
function schedulePlot(plot, cond) {
  const plotWithIrr = { ...plot, irrigation: cond.irrigation };
  const avgPrices = {};
  CROPS.forEach(c => {
    avgPrices[c.id] = Object.values(c.price).reduce((a,b)=>a+b,0)/12;
  });

  const assignments = [];
  let currentMonth = parseInt(cond.startMonth);
  let lastFamily = null;
  const maxRounds = 6;

  for (let round = 0; round < maxRounds; round++) {
    const candidates = CROPS
      .filter(c => !(c.family === lastFamily && lastFamily !== '' && lastFamily !== 'grass'))
      .map(c => {
        // 動態週期：依溫度/pH/灌溉調整
        const cycleInfo = adjustedCycle(c, currentMonth, cond.region, plotWithIrr);
        const harvestMonth = ((currentMonth - 1 + Math.round(cycleInfo.days / 30)) % 12) + 1;
        const price = c.price[harvestMonth];
        const priceRatio = price / avgPrices[c.id];
        const score = scoreCrop(c, cond, plot);
        return { crop: c, cycleInfo, harvestMonth, price, priceRatio, score,
                 combined: score * 0.5 + priceRatio * 50 };
      })
      .sort((a, b) => b.combined - a.combined);

    if (!candidates.length) break;
    const chosen = candidates[0];
    assignments.push({
      crop:       chosen.crop,
      cycleInfo:  chosen.cycleInfo,
      plantMonth: currentMonth,
      harvestMonth: chosen.harvestMonth,
      price:      chosen.price,
      priceRatio: chosen.priceRatio,
    });
    lastFamily = chosen.crop.family;
    currentMonth = (chosen.harvestMonth % 12) + 1;

    const totalMonths = assignments.reduce((s, a) =>
      s + Math.round(a.cycleInfo.days / 30) + 1, 0);
    if (totalMonths >= 12) break;
  }
  return assignments;
}

// ── 主函數 ───────────────────────────────────────────────────
function runPlanner() {
  if(plots.length===0){ alert('請先新增至少一塊地塊！'); return; }
  const cond = {
    region: document.getElementById('region').value,
    env: document.getElementById('env').value,
    irrigation: document.getElementById('irrigation').value,
    exp: document.getElementById('exp').value,
    startMonth: parseInt(document.getElementById('startMonth').value),
  };

  const allSchedules = plots.map(plot=>({
    plot,
    assignments: schedulePlot(plot, cond),
  }));

  document.getElementById('results').style.display='block';
  renderGantt(allSchedules);
  renderNetTable(allSchedules);
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── 甘特圖 ───────────────────────────────────────────────────
const CROP_COLORS = [
  'rgba(167,139,250,', 'rgba(34,211,238,',  'rgba(74,222,128,',
  'rgba(251,191,36,',  'rgba(248,113,113,', 'rgba(251,146,60,',
];
const MONTHS_LBL = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function renderGantt(schedules) {
  const wrap = document.getElementById('gantt');
  const header = `<div class="gantt-header"><div></div>${MONTHS_LBL.map(m=>`<div class="mh">${m}</div>`).join('')}</div>`;
  const warns = [];

  const plotRows = schedules.map(({plot, assignments})=>{
    // 檢查連作警告
    const families = assignments.map(a=>a.crop.family);
    for(let i=1;i<families.length;i++){
      if(families[i]===families[i-1] && families[i]!=='grass'){
        warns.push(`${plot.name}：連續種植同科（${families[i]}）— ${assignments[i-1].crop.name} → ${assignments[i].crop.name}`);
      }
    }

    // 為每個作物分配顏色
    const cropColorMap = {};
    let colorIdx = 0;
    assignments.forEach(a=>{
      if(!cropColorMap[a.crop.id]) cropColorMap[a.crop.id] = CROP_COLORS[colorIdx++ % CROP_COLORS.length];
    });

    const monthData = {};
    for(let m=1;m<=12;m++) monthData[m]={type:'empty',color:null,extra:[]};

    assignments.forEach(({crop, cycleInfo, plantMonth, harvestMonth, price})=>{
      const col = cropColorMap[crop.id];
      const avg = Object.values(crop.price).reduce((a,b)=>a+b,0)/12;
      const hClass = price>avg*1.2 ? 'h-hi' : price>avg*0.85 ? 'h-med' : 'h-lo';

      // 填充月份（用實際調整後的週期）
      let m = plantMonth;
      let monthsLeft = Math.round(cycleInfo.days/30)+1;
      for(let i=0;i<monthsLeft;i++){
        const cur = ((m-1+i)%12)+1;
        if(cur===plantMonth) monthData[cur]={type:'plant',color:col,extra:[]};
        else if(cur===harvestMonth) monthData[cur]={type:hClass,color:col,extra:[]};
        else if(monthData[cur].type==='empty') monthData[cur]={type:'grow',color:col,extra:[]};
      }

      // 風險標記
      crop.typhoon.forEach(t=>{ if(monthData[t]) monthData[t].extra.push('typhoon'); });
      crop.cold.forEach(t=>{    if(monthData[t]) monthData[t].extra.push('cold'); });
    });

    // 圖例行（本地塊用到的作物）
    const legendItems = assignments.map(a=>{
      const col=cropColorMap[a.crop.id];
      const adj = a.cycleInfo.factor !== 1.0
        ? `<span style="color:${a.cycleInfo.factor>1?'var(--yellow)':'var(--green)'}">${a.cycleInfo.days}天</span>`
        : `${a.cycleInfo.days}天`;
      const tip = a.cycleInfo.reasons.join(' | ');
      return `<div class="cc-item" title="${tip}"><div class="cc-dot" style="background:${col}0.7)"></div>${a.crop.name}（${adj}，均溫${a.cycleInfo.avgTemp}°C）</div>`;
    });
    const legendRow = `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;font-size:11px">${legendItems.join('')}</div>`;

    const cells = Array.from({length:12},(_,i)=>{
      const d=monthData[i+1];
      const bg = d.color ? `background:${d.color}${d.type==='plant'?'0.5':d.type==='grow'?'0.2':'0.6'})` : '';
      return `<div class="g-cell ${d.type} ${d.extra.join(' ')}" style="${bg}" title="${MONTHS_LBL[i]}"></div>`;
    }).join('');

    return `<div class="gantt-plot-label">📍 ${plot.name}（${plot.area}分地）</div>
      ${legendRow}
      <div class="gantt-row"><div class="g-name">種植排程</div>${cells}</div>`;
  }).join('');

  wrap.innerHTML = header + plotRows;

  // 輪作警告
  const warnEl = document.getElementById('rotationWarns');
  warnEl.innerHTML = warns.length
    ? `<div class="rotation-warn"><b>⚠ 輪作警告</b>${warns.map(w=>`<div>• ${w}</div>`).join('')}</div>`
    : '';
}

// ── 淨利表 ───────────────────────────────────────────────────
function renderNetTable(schedules) {
  const rows = [];
  let totalRevenue=0, totalCost=0;

  const MNAMES=['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  schedules.forEach(({plot, assignments})=>{
    assignments.forEach(({crop, cycleInfo, plantMonth, harvestMonth, price})=>{
      const co = cropCosts[crop.id];
      const costPerTan = co.seed+co.fert+co.pest+co.labor;
      const grossPerTan = crop.yieldPerTan * price * 0.6 / 1000;
      const gross = grossPerTan * plot.area;
      const cost  = costPerTan * plot.area / 1000;
      const net   = gross - cost;
      totalRevenue += gross;
      totalCost    += cost;

      const netClass = net>0?'hi':net>-5?'med':'lo';
      const wr = WIN_RATE[crop.name];
      // 週期顯示：若有調整則顯示原始→調整
      const cycleDisplay = cycleInfo.factor !== 1.0
        ? `<span style="color:${cycleInfo.factor>1?'var(--yellow)':'var(--green)'}"
             title="${cycleInfo.reasons.join('\n')}">${cycleInfo.days}天</span>
           <span style="color:var(--muted);font-size:10px">（基礎${crop.cycle}天，×${cycleInfo.factor}）</span>`
        : `${cycleInfo.days}天`;
      rows.push(`<tr>
        <td>${plot.name}</td>
        <td>${crop.name}</td>
        <td>${MNAMES[plantMonth]} → ${MNAMES[harvestMonth]}</td>
        <td>${cycleDisplay}</td>
        <td class="num">${price.toFixed(0)} 元/kg</td>
        <td class="num">${(crop.yieldPerTan*plot.area).toLocaleString()} kg</td>
        <td class="num">${gross.toFixed(1)} 千</td>
        <td class="num lo">${cost.toFixed(1)} 千</td>
        <td class="num ${netClass}">${net.toFixed(1)} 千</td>
        <td class="num" style="color:var(--cyan)">${wr?wr.win:'-'}%</td>
      </tr>`);
    });
  });

  const totalNet = totalRevenue - totalCost;
  document.getElementById('netTable').innerHTML = `
    <thead><tr>
      <th>地塊</th><th>作物</th><th>種 → 收</th><th>實際週期</th><th>均價</th><th>總產量</th>
      <th class="num">毛收入</th><th class="num">成本</th><th class="num">淨利</th><th class="num">模型勝率</th>
    </tr></thead>
    <tbody>${rows.join('')}</tbody>
    <tfoot><tr>
      <td colspan="6">全年合計</td>
      <td class="num">${totalRevenue.toFixed(1)} 千</td>
      <td class="num lo">${totalCost.toFixed(1)} 千</td>
      <td class="num ${totalNet>0?'hi':'lo'}">${totalNet.toFixed(1)} 千元</td>
      <td></td>
    </tr></tfoot>`;
}

// ── 初始化 ───────────────────────────────────────────────────
addPlot('地塊 A', 3, 'loam', 6.5);
addPlot('地塊 B', 2, 'sandy', 6.0);
renderCostsTable();
</script>
