<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>種植排程規劃 — 台灣蔬菜價格</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d2e; --surface2: #252840;
    --border: #2e3250; --text: #e2e8f0; --muted: #8892a4;
    --green: #4ade80; --yellow: #fbbf24; --red: #f87171;
    --blue: #60a5fa; --purple: #a78bfa; --cyan: #22d3ee;
    --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Pro Text', system-ui, sans-serif; min-height: 100vh; }

  /* ── Nav ── */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  nav a { color: var(--muted); text-decoration: none; font-size: 14px; }
  nav a:hover { color: var(--text); }
  nav .title { color: var(--text); font-weight: 600; font-size: 16px; }
  nav .sep { color: var(--border); }

  /* ── Layout ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  /* ── Form ── */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 32px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .form-group select, .form-group input[type=range], .form-group input[type=number] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 12px; font-size: 14px; outline: none;
  }
  .form-group select:focus, .form-group input:focus { border-color: var(--purple); }
  .ph-display { font-size: 18px; font-weight: 700; color: var(--cyan); margin-top: 4px; }
  .btn { background: var(--purple); color: #fff; border: none; border-radius: 8px; padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .form-footer { grid-column: 1/-1; margin-top: 8px; }

  /* ── Section heading ── */
  .section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title::before { content: ''; display: block; width: 4px; height: 18px; background: var(--purple); border-radius: 2px; }

  /* ── Crop cards ── */
  .crops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 40px; }
  .crop-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; position: relative; overflow: hidden; }
  .crop-card.top { border-color: var(--purple); }
  .crop-card .badge { position: absolute; top: 12px; right: 12px; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
  .badge-best { background: rgba(167,139,250,.2); color: var(--purple); }
  .badge-good { background: rgba(74,222,128,.15); color: var(--green); }
  .badge-ok   { background: rgba(251,191,36,.12); color: var(--yellow); }
  .crop-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .crop-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--surface2); color: var(--muted); }
  .tag.match { background: rgba(34,211,238,.1); color: var(--cyan); }
  .crop-score-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 10px; }
  .crop-score-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--purple), var(--cyan)); transition: width .6s ease; }
  .crop-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .stat { text-align: center; }
  .stat .val { font-size: 14px; font-weight: 700; }
  .stat .lbl { font-size: 10px; color: var(--muted); }
  .best-plant { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  .best-plant span { color: var(--green); font-weight: 600; }
  .warn { color: var(--yellow); }

  /* ── Calendar ── */
  .calendar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 40px; overflow-x: auto; }
  .cal-grid { min-width: 700px; }
  .cal-header { display: grid; grid-template-columns: 140px repeat(12, 1fr); gap: 2px; margin-bottom: 6px; }
  .cal-header .month-lbl { text-align: center; font-size: 11px; color: var(--muted); font-weight: 600; padding: 4px 0; }
  .cal-row { display: grid; grid-template-columns: 140px repeat(12, 1fr); gap: 2px; margin-bottom: 3px; align-items: center; }
  .cal-crop-name { font-size: 12px; color: var(--text); padding-right: 8px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cal-cell { height: 22px; border-radius: 3px; background: var(--surface2); position: relative; cursor: default; }
  .cal-cell.plant   { background: rgba(167,139,250,.35); }
  .cal-cell.grow    { background: rgba(34,211,238,.2); }
  .cal-cell.harvest-hi  { background: rgba(74,222,128,.55); }
  .cal-cell.harvest-med { background: rgba(251,191,36,.4); }
  .cal-cell.harvest-lo  { background: rgba(248,113,113,.35); }
  .cal-cell.risk-typhoon { outline: 2px solid rgba(251,191,36,.5); }
  .cal-cell.risk-cold    { outline: 2px solid rgba(96,165,250,.5); }
  .cal-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; font-size: 11px; color: var(--muted); }
  .leg { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 12px; height: 12px; border-radius: 2px; }

  /* ── Revenue table ── */
  .rev-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .rev-table th { text-align: left; padding: 8px 12px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
  .rev-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .rev-table tr:last-child td { border-bottom: none; }
  .rev-table .num { text-align: right; font-variant-numeric: tabular-nums; }
  .hi { color: var(--green); font-weight: 700; }
  .med { color: var(--yellow); }
  .lo { color: var(--red); }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }

  /* ── Tooltip ── */
  [data-tip] { position: relative; }
  [data-tip]:hover::after { content: attr(data-tip); position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #2e3250; color: var(--text); font-size: 11px; padding: 4px 8px; border-radius: 4px; white-space: nowrap; z-index: 10; pointer-events: none; }
</style>
</head>

<nav>

  <span class="title">種植排程規劃</span>

        <option value="south">南部（嘉義/台南/高雄）</option>
        <option value="east">東部（宜蘭/花蓮/台東）</option>
      </select>
    </div>
    <div class="form-group">

      <select id="env">

        <option value="net" selected>網室</option>
        <option value="both">露天 + 網室</option>
      </select>
    </div>
    <div class="form-group">
      <label>土壤類型</label>
      <select id="soil">
        <option value="sandy">砂質土（排水快）</option>
        <option value="loam" selected>壤土（最佳）</option>
        <option value="clay">黏土（排水差）</option>
      </select>
    </div>
    <div class="form-group">
      <label>灌溉設備</label>
      <select id="irrigation">
        <option value="drip" selected>滴灌</option>
        <option value="sprinkler">噴灌</option>
        <option value="manual">人工澆水</option>
      </select>
    </div>
    <div class="form-group">
      <label>土壤 pH　<span class="ph-display" id="phVal">6.5</span></label>
      <input type="range" id="ph" min="4.5" max="7.5" step="0.1" value="6.5"
             oninput="document.getElementById('phVal').textContent=this.value">
    </div>
    <div class="form-group">
      <label>農地面積（分）</label>
      <input type="number" id="area" value="5" min="1" max="100">
    </div>
    <div class="form-group">
      <label>種植經驗</label>
      <select id="exp">
        <option value="beginner">新手（1年以下）</option>
        <option value="mid" selected>中等（1–5年）</option>
        <option value="expert">老農（5年以上）</option>
      </select>
    </div>
    <div class="form-group">
      <label>開始月份</label>
      <select id="startMonth">
        <option value="1">1月</option><option value="2">2月</option>
        <option value="3" selected>3月</option><option value="4">4月</option>
        <option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option>
        <option value="9">9月</option><option value="10">10月</option>
        <option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <div class="form-footer">
      <button class="btn" onclick="runPlanner()">產生種植計畫</button>
    </div>
  </div>

  <!-- ── 結果區 ── -->
  <div id="results" style="display:none">

    <div class="section-title">推薦作物（依綜合評分排序）</div>
    <div class="crops-grid" id="cropCards"></div>

    <div class="section-title">12 個月種植甘特圖</div>
    <div class="calendar-wrap">
      <div class="cal-grid" id="gantt"></div>
      <div class="cal-legend">
        <div class="leg"><div class="leg-dot" style="background:rgba(167,139,250,.5)"></div>種植期</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(34,211,238,.3)"></div>生長期</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(74,222,128,.6)"></div>收成（高價）</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(251,191,36,.5)"></div>收成（中價）</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(248,113,113,.45)"></div>收成（低價）</div>
        <div class="leg"><div class="leg-dot" style="outline:2px solid rgba(251,191,36,.8); background:transparent"></div>颱風風險</div>
        <div class="leg"><div class="leg-dot" style="outline:2px solid rgba(96,165,250,.8); background:transparent"></div>低溫風險</div>
      </div>
    </div>

    <div class="section-title">預估年收益（粗估，僅供參考）</div>
    <div class="calendar-wrap">
      <table class="rev-table" id="revTable"></table>
    </div>

  </div>

  <div id="emptyState">
    <div class="empty">
      <div class="icon">🌱</div>
      <div>填入農地條件，點擊「產生種植計畫」</div>
    </div>
  </div>
</div>

// ── 勝率資料（來自 xgb_v3 分類模型）────────────────────────
const WIN_RATE = {
  '甘藍-初秋':    { t60: { win: 69, avoid: 87 }, t90: { win: 69, avoid: 82 } },
  '甘藍-改良種':  { t60: { win: 62, avoid: 64 }, t90: { win: 63, avoid: 69 } },
  '蘿蔔-矸仔':    { t60: { win: 75, avoid: 62 }, t90: { win: 72, avoid: 69 } },
  '包心白-包白':  { t60: { win: 55, avoid: 68 }, t90: { win: 43, avoid: 54 } },
  '番茄-牛番茄':  { t60: { win: 70, avoid: 61 }, t90: { win: 66, avoid: 58 } },
  '花胡瓜':       { t60: { win: 61, avoid: 46 }, t90: { win: 71, avoid: 52 } },
  '胡蘿蔔-清洗':  { t60: { win: 44, avoid: 70 }, t90: { win: 55, avoid: 84 } },
  '絲瓜':         { t60: { win: 53, avoid: 57 }, t90: { win: 63, avoid: 57 } },
  '小白菜-蚵仔白':{ t60: { win: 51, avoid: 47 }, t90: { win: 55, avoid: 68 } },
  '玉米-甜軟殼':  { t60: { win: 61, avoid: 62 }, t90: { win: 58, avoid: 55 } },
  '苦瓜-白大米':  { t60: { win: 80, avoid: 40 }, t90: { win: 53, avoid: 48 } },
  '苦瓜-翠綠':    { t60: { win: 67, avoid: 47 }, t90: { win: 86, avoid: 56 } },
  '苦瓜-山苦瓜':  { t60: { win: 59, avoid: 51 }, t90: { win: 59, avoid: 41 } },
};

// ── 篩選與評分邏輯 ───────────────────────────────────────────
function scoreCrop(crop, cond) {
  let score = 0; const reasons = []; const warnings = [];

  // pH 適合度
  const ph = parseFloat(cond.ph);
  if (ph >= crop.ph[0] && ph <= crop.ph[1]) { score += 25; reasons.push(`pH ${ph} 適合`); }
  else { score -= 15; warnings.push(`pH 不在理想範圍 ${crop.ph[0]}–${crop.ph[1]}`); }

  // 土壤
  if (crop.soils.includes(cond.soil)) { score += 20; reasons.push('土壤類型吻合'); }
  else { score -= 10; warnings.push('土壤類型不理想'); }

  // 環境
  if (crop.env.includes(cond.env) || crop.env.includes('both')) { score += 15; }

  // 灌溉
  if (crop.irrigation.includes(cond.irrigation)) { score += 10; }
  else { warnings.push('灌溉方式不完全吻合'); }

  // 難度 vs 經驗
  const expScore = { beginner: 1, mid: 2, expert: 3 }[cond.exp];
  if (crop.difficulty <= expScore) { score += 10; }
  else { score -= 10; warnings.push(`難度較高（建議有經驗者）`); }

  // 勝率加分（取 t60 和 t90 均值）
  const wr = WIN_RATE[crop.name];
  if (wr) {
    const avgWin = (wr.t60.win + wr.t90.win) / 2;
    score += Math.round((avgWin - 50) * 0.4);
  }

  // 黏土限制根莖類
  if (cond.soil === 'clay' && ['radish','carrot'].includes(crop.id)) {
    score -= 20; warnings.push('黏土不適合根莖類');
  }

  return { score: Math.max(0, Math.min(100, score + 50)), reasons, warnings };
}

function getBestWindows(crop, startMonth) {
  // 在 12 個月內找到最好的種植窗口
  return crop.plantWindows.map(w => {
    const harvestPrice = crop.price[w.harvestMonth];
    const avgPrice = Object.values(crop.price).reduce((a,b)=>a+b,0) / 12;
    const priceRatio = harvestPrice / avgPrice;
    return { ...w, harvestPrice, priceRatio };
  }).sort((a,b) => b.harvestPrice - a.harvestPrice);
}

// ── 甘特圖資料產生 ───────────────────────────────────────────
function buildGanttData(crop, topWindow) {
  const result = {};
  const months = Array.from({length:12},(_,i)=>i+1);
  const plantM = topWindow.plantMonth;
  const harvestM = topWindow.harvestMonth;
  const cycleMonths = Math.ceil(crop.cycle / 30);

  months.forEach(m => {
    let type = 'empty';
    // 判斷這個月在哪個階段
    if (m === plantM) type = 'plant';
    else {
      // 收成月
      if (m === harvestM) {
        const price = crop.price[m];
        const avg = Object.values(crop.price).reduce((a,b)=>a+b,0)/12;
        type = price > avg * 1.2 ? 'harvest-hi' : price > avg * 0.85 ? 'harvest-med' : 'harvest-lo';
      } else {
        // 生長期：plantMonth 和 harvestMonth 之間
        let inGrow = false;
        if (plantM < harvestM) inGrow = m > plantM && m < harvestM;
        else inGrow = m > plantM || m < harvestM; // 跨年
        if (inGrow) type = 'grow';
      }
    }

    // 疊加風險
    const extra = [];
    if (crop.typhoonRisk.includes(m)) extra.push('risk-typhoon');
    if (crop.coldRisk.includes(m)) extra.push('risk-cold');
    result[m] = { type, extra };
  });
  return result;
}

// ── 主邏輯 ───────────────────────────────────────────────────
function runPlanner() {
  const cond = {
    region: document.getElementById('region').value,
    env: document.getElementById('env').value,
    soil: document.getElementById('soil').value,
    irrigation: document.getElementById('irrigation').value,
    ph: document.getElementById('ph').value,
    area: parseFloat(document.getElementById('area').value) || 5,
    exp: document.getElementById('exp').value,
    startMonth: parseInt(document.getElementById('startMonth').value),
  };

  // 評分並排序
  const scored = CROPS.map(crop => ({
    crop,
    ...scoreCrop(crop, cond),
    windows: getBestWindows(crop, cond.startMonth),
  })).sort((a,b) => b.score - a.score);

  // 取前 6 名
  const top = scored.slice(0, 6);

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('results').style.display = 'block';

  renderCards(top);
  renderGantt(top);
  renderRevTable(top, cond.area);
}

function renderCards(items) {
  const MONTHS = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const container = document.getElementById('cropCards');
  container.innerHTML = items.map((item, idx) => {
    const { crop, score, warnings, windows } = item;
    const bestWin = windows[0];
    const wr = WIN_RATE[crop.name];
    const avgWin = wr ? Math.round((wr.t60.win + wr.t90.win) / 2) : '-';
    const avgAvoid = wr ? Math.round((wr.t60.avoid + wr.t90.avoid) / 2) : '-';
    const badgeClass = idx === 0 ? 'badge-best' : idx < 3 ? 'badge-good' : 'badge-ok';
    const badgeText = idx === 0 ? '最推薦' : idx < 3 ? '推薦' : '可考慮';
    const diffStr = ['','★','★★','★★★'][crop.difficulty];
    const priceClass = bestWin.priceRatio > 1.2 ? 'hi' : bestWin.priceRatio > 0.9 ? 'med' : 'lo';

    return `<div class="crop-card ${idx===0?'top':''}">
      <div class="badge ${badgeClass}">${badgeText}</div>
      <div class="crop-name">${crop.name}</div>
      <div class="crop-meta">
        <span class="tag">種植週期 ${crop.cycle}天</span>
        <span class="tag">難度 ${diffStr}</span>
        ${warnings.map(w=>`<span class="tag warn">⚠ ${w}</span>`).join('')}
      </div>
      <div class="crop-score-bar"><div class="crop-score-fill" style="width:${score}%"></div></div>
      <div class="crop-stats">
        <div class="stat"><div class="val ${priceClass}">${bestWin.harvestPrice}</div><div class="lbl">收成均價</div></div>
        <div class="stat"><div class="val" style="color:var(--cyan)">${avgWin}%</div><div class="lbl">種時贏率</div></div>
        <div class="stat"><div class="val" style="color:var(--purple)">${avgAvoid}%</div><div class="lbl">避虧率</div></div>
      </div>
      <div class="best-plant">
        最佳種植：<span>${MONTHS[bestWin.plantMonth]}</span> 種 → <span>${MONTHS[bestWin.harvestMonth]}</span> 收（${bestWin.label}）
        ${crop.notes ? `<br><span style="color:var(--muted)">${crop.notes}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderGantt(items) {
  const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const gantt = document.getElementById('gantt');
  const header = `<div class="cal-header">
    <div></div>
    ${MONTHS.map(m=>`<div class="month-lbl">${m}</div>`).join('')}
  </div>`;

  const rows = items.map(item => {
    const { crop, windows } = item;
    const ganttData = buildGanttData(crop, windows[0]);
    const cells = Array.from({length:12},(_,i)=>{
      const d = ganttData[i+1];
      return `<div class="cal-cell ${d.type} ${d.extra.join(' ')}" data-tip="${getCellTip(crop, i+1, d)}"></div>`;
    }).join('');
    return `<div class="cal-row">
      <div class="cal-crop-name">${crop.name}</div>
      ${cells}
    </div>`;
  }).join('');

  gantt.innerHTML = header + rows;
}

function getCellTip(crop, month, data) {
  const MNAMES = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const price = crop.price[month];
  const tips = [`${MNAMES[month]} 均價 ${price}元`];
  if (data.type === 'plant') tips.push('種植');
  if (data.type === 'grow') tips.push('生長期');
  if (data.type.startsWith('harvest')) tips.push('收成');
  if (data.extra.includes('risk-typhoon')) tips.push('⚠颱風季');
  if (data.extra.includes('risk-cold')) tips.push('⚠低溫風險');
  return tips.join(' | ');
}

function renderRevTable(items, area) {
  const table = document.getElementById('revTable');
  const MONTHS = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const rows = items.map(item => {
    const { crop, windows } = item;
    const bestWin = windows[0];
    // 一分地的粗估收益 = yieldPerTan * 收成均價 * 0.6（市場良率 60%）
    const revenuePerTan = crop.yieldPerTan * bestWin.harvestPrice * 0.6 / 1000; // 千元
    const totalRevenue = (revenuePerTan * area).toFixed(1);
    const wr = WIN_RATE[crop.name];
    const winRate = wr ? Math.round((wr.t60.win + wr.t90.win) / 2) : '-';
    const priceClass = bestWin.priceRatio > 1.2 ? 'hi' : bestWin.priceRatio > 0.9 ? 'med' : 'lo';
    return `<tr>
      <td>${crop.name}</td>
      <td>${MONTHS[bestWin.plantMonth]} → ${MONTHS[bestWin.harvestMonth]}</td>
      <td class="num">${bestWin.harvestPrice} 元/kg</td>
      <td class="num">${crop.yieldPerTan} kg/分</td>
      <td class="num ${priceClass}">${totalRevenue} 千元</td>
      <td class="num" style="color:var(--cyan)">${winRate}%</td>
    </tr>`;
  });

  table.innerHTML = `<thead><tr>
    <th>作物</th><th>種植 → 收成</th><th>均價</th><th>預估產量</th>
    <th class="num">估計收益（${area}分地）</th><th class="num">模型勝率</th>
  </tr></thead><tbody>${rows.join('')}</tbody>
  <tfoot><tr style="border-top:2px solid var(--border)">
    <td colspan="4" style="color:var(--muted);font-size:12px;padding:12px">
      ※ 收益 = 產量 × 均價 × 良率60%，未含工資、肥料、農藥等成本。實際收益依天候、管理差異而異。
    </td>
  </tr></tfoot>`;
}
